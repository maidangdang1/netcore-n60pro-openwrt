name: Build Openwrt Firmware

on:
  push:
    branches:
      - master
      - main
    paths:
      - '.openwrt-config'
      - 'openwrt-feeds.conf.default'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt full-upgrade -y
          sudo apt install -qq -y bison build-essential clang flex g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Clone Openwrt source code
        run: |
          git clone https://github.com/openwrt/openwrt.git openwrt-build
        working-directory: ${{ github.workspace }}

      - name: Load custom feeds
        run: |
          [ -e openwrt-feeds.conf.default ] && cp openwrt-feeds.conf.default openwrt-build/feeds.conf.default
          chmod +x openwrt-feed.sh
          cd openwrt-build
          $GITHUB_WORKSPACE/openwrt-feed.sh

      - name: Update package feeds
        run: |
          cd openwrt-build
          ./scripts/feeds update -a

      - name: Install package feeds
        run: |
          cd openwrt-build
          ./scripts/feeds install -a

      - name: Copy config file
        run: |
          cp .openwrt-config openwrt-build/.config
        working-directory: ${{ github.workspace }}

      - name: Load custom config
        run: |
          chmod +x openwrt-conf.sh
          cd openwrt-build
          $GITHUB_WORKSPACE/openwrt-conf.sh

      - name: Configure build
        run: |
          cd openwrt-build
          make defconfig

      - name: Download packages
        run: |
          cd openwrt-build
          make download -j$(nproc)

      - name: Build firmware
        run: |
          cd openwrt-build
          make -j$(nproc) V=s || make -j1 V=s

      - name: Find firmware files
        id: find-files
        run: |
          cd openwrt-build
          # Find all image files
          echo "firmware_files=$(find ./bin/targets -name '*.bin' -o -name '*.img' -o -name '*.tar.gz' | tr '\n' ',')" >> $GITHUB_OUTPUT

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: |
            openwrt-build/bin/targets/**/*
          retention-days: 30
